status = warn
name = UnityCatalogServerConfig

# Console appender for stdout
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Rolling file appender
appender.rolling.type = RollingFile
appender.rolling.name = RollingFile
appender.rolling.fileName = ${sys:uc.log.dir:-logs}/server.log
appender.rolling.filePattern = ${sys:uc.log.dir:-logs}/server-%d{yyyy-MM-dd}-%i.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.rolling.policies.type = Policies
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 10MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 5

# Root logger
rootLogger.level = ${sys:uc.log.level:-info}
rootLogger.appenderRefs = console, rolling
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.rolling.ref = RollingFile

# Quiet noisy libraries
logger.hibernate.name = org.hibernate
logger.hibernate.level = warn

logger.h2.name = org.h2
logger.h2.level = warn

logger.armeria.name = com.linecorp.armeria
logger.armeria.level = warn

# UC code at configurable level
logger.uc.name = io.unitycatalog
logger.uc.level = ${sys:uc.log.level:-info}
