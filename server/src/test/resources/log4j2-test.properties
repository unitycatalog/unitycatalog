status = warn
name = UnityCatalogTestConfig

# Console-only appender for test output
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

rootLogger.level = warn
rootLogger.appenderRefs = console
rootLogger.appenderRef.console.ref = Console

# UC server logs at info level during tests
logger.uc.name = io.unitycatalog
logger.uc.level = info

# Silence Hibernate and H2 during tests
logger.hibernate.name = org.hibernate
logger.hibernate.level = error

logger.h2.name = org.h2
logger.h2.level = error
