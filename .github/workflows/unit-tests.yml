# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Unit Tests

on:
  push:
    branches: [ "main", "branch-*" ]
  pull_request:
    branches: [ "main", "branch-*" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # Build a human-readable job name from the matrix entry, e.g.:
    #   "All tests (Spark 4.0.0, Delta 4.1.0)"
    #   "[Non Blocking] Spark tests (Spark 4.2.0-SNAPSHOT, Delta master-SNAPSHOT)"
    name: >-
      ${{ matrix.non-blocking && '[Non Blocking]' || '' }}
      ${{ matrix.validation-mode == 'spark-tests' && 'Spark tests' || 'All tests' }}
      (Spark ${{ matrix.spark-version }}${{ matrix.delta-version != '' && format(', Delta {0}', matrix.delta-version) || '' }})
    continue-on-error: ${{ matrix.non-blocking || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - spark-version: "4.0.0"
            delta-version: "4.1.0"
            # This is the primary combo: runs ALL tests (unit, spark, license).
            # Other combos run only spark connector tests since unit tests and
            # license checks don't depend on Spark/Delta versions.
            validation-mode: "all-tests"
            non-blocking: false
          - spark-version: "4.1.0"
            delta-version: "4.1.0"
            validation-mode: "spark-tests"
            non-blocking: false
          - spark-version: "4.1.0"
            delta-version: "master-SNAPSHOT"
            validation-mode: "spark-tests"
            # Cross-version testing with Delta master is informational; failures
            # indicate upcoming incompatibilities but should not block PRs.
            non-blocking: true
          - spark-version: "4.2.0-SNAPSHOT"
            delta-version: "master-SNAPSHOT"
            delta-repo: "seewishnew/delta"
            delta-ref: "enable-spark-master-cross-build"
            # SNAPSHOT Spark: disable Delta's UC auto-build (we pre-publish UC
            # at the expected coordinate in the build step below instead).
            delta-skip-uc-auto-build: true
            validation-mode: "spark-tests"
            non-blocking: true

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'sbt'

    - name: Resolve Delta master version and commit SHA
      if: matrix.delta-version == 'master-SNAPSHOT'
      id: delta-meta
      run: |
        DELTA_REPO="${{ matrix.delta-repo || 'delta-io/delta' }}"
        DELTA_REF="${{ matrix.delta-ref || 'master' }}"
        DELTA_SHA=$(git ls-remote "https://github.com/$DELTA_REPO.git" "$DELTA_REF" | cut -f1)
        if [ -z "$DELTA_SHA" ]; then
          DELTA_SHA=$(git ls-remote "https://github.com/$DELTA_REPO.git" HEAD | cut -f1)
        fi
        DELTA_VER=$(curl -fsSL "https://raw.githubusercontent.com/$DELTA_REPO/$DELTA_REF/version.sbt" \
              | grep -oP '(?<=")[^"]*-SNAPSHOT(?=")') || \
          DELTA_VER=$(curl -fsSL "https://raw.githubusercontent.com/$DELTA_REPO/master/version.sbt" \
              | grep -oP '(?<=")[^"]*-SNAPSHOT(?=")')
        if [ -z "$DELTA_VER" ]; then
          echo "::error::Failed to resolve Delta SNAPSHOT version from $DELTA_REPO/$DELTA_REF"
          exit 1
        fi
        echo "sha=$DELTA_SHA" >> $GITHUB_OUTPUT
        echo "version=$DELTA_VER" >> $GITHUB_OUTPUT

    - name: Cache Delta SNAPSHOT local Maven artifacts
      if: matrix.delta-version == 'master-SNAPSHOT'
      id: delta-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.m2/repository/io/delta
        key: delta-snapshot-${{ matrix.delta-repo || 'delta-io/delta' }}-${{ steps.delta-meta.outputs.sha }}

    - name: Build Delta SNAPSHOT from source and publish to local Maven
      if: matrix.delta-version == 'master-SNAPSHOT' && steps.delta-cache.outputs.cache-hit != 'true'
      run: |
        DELTA_REPO="${{ matrix.delta-repo || 'delta-io/delta' }}"
        DELTA_REF="${{ matrix.delta-ref || 'master' }}"
        SPARK_MAJOR_MINOR=$(echo "${{ matrix.spark-version }}" | cut -d. -f1,2)
        git clone --depth=1 --branch="$DELTA_REF" "https://github.com/$DELTA_REPO.git" /tmp/delta || \
          git clone --depth=1 "https://github.com/$DELTA_REPO.git" /tmp/delta
        cd /tmp/delta
        SKIP_UC_FLAG=""
        if [[ "${{ matrix.delta-skip-uc-auto-build }}" == "true" ]]; then
          SKIP_UC_FLAG="-Ddelta.autoBuildPinnedUnityCatalog=false"
          SPARK_MAJOR_MINOR=$SPARK_MAJOR_MINOR bash project/scripts/setup_unitycatalog_main.sh
        fi
        build/sbt -DsparkVersion=$SPARK_MAJOR_MINOR \
          $SKIP_UC_FLAG \
          storage/publishM2 \
          kernelApi/publishM2 \
          kernelDefaults/publishM2 \
          kernelUnityCatalog/publishM2 \
          spark/publishM2

    - name: Set effective Delta version
      run: |
        if [[ "${{ matrix.delta-version }}" == "master-SNAPSHOT" ]]; then
          echo "DELTA_VERSION=${{ steps.delta-meta.outputs.version }}" >> $GITHUB_ENV
        else
          echo "DELTA_VERSION=${{ matrix.delta-version }}" >> $GITHUB_ENV
        fi

      # 'integrationTests' is not in root project, since we avoid running it via `./build/sbt test`,
      # Here, we explicitly compile `integrationTests` to catch compilation issues early.
    - name: Compile integration tests to verify compilation and checkstyle issues.
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G integrationTests/test:compile

    - name: Build and verify the local deployment.
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G clean package publishM2

    - name: Run tests with coverage
      run: |
        if [[ "${{ matrix.validation-mode }}" == "spark-tests" ]]; then
          echo "Running spark connector tests"
          build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G spark/jacoco
        else
          echo "Running all tests"
          build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G +jacoco
        fi

    - name: Run license check
      if: matrix.validation-mode == 'all-tests'
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION licenseCheck
