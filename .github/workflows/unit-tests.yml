# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Unit Tests

on:
  push:
    branches: [ "main", "branch-*" ]
  pull_request:
    branches: [ "main", "branch-*" ]

permissions:
  contents: read

# Spark/Delta CI policy lives in project/spark-versions.json (ciTestMatrix + source-build
# metadata). project/scripts/get_spark_version_info.py is the workflow-facing API.
#
# Every PR runs two jobs:
# 1. generate-matrix: read ciTestMatrix and emit one flat test matrix over all Spark rows.
#    Each row carries a source-build flag derived from sourceBuildDefaultRef in metadata.
# 2. test: a single matrix job over every row. For each Spark version:
#      - published Spark (source-build: false): run tests against the published artifacts.
#      - source-built Spark (source-build: true): restore the Spark Maven cache; on a miss
#        build Spark and save the cache; then run tests against it.
#
# There is no separate build job and no hardcoded Spark version. Published rows skip the
# Spark build step entirely, so they never wait behind a source build, and the matrix runs
# all rows in parallel. The Spark build is inlined per row because UC runs one runner per
# combo (not sharded). Delta keeps a dedicated build job only because it shards each Spark
# version across many runners and must build once and restore into every shard.
#
# Cache model: the test job saves ~/.m2/org/apache/spark under an exact cache key (no
# restore-keys). When the Spark SHA or build_spark.sh changes, a new key is used; older
# cache entries become orphaned and GitHub evicts them by LRU.
jobs:
  generate-matrix:
    name: Generate CI test matrix
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.generate.outputs.test_matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Generate CI test matrix from metadata
        id: generate
        run: |
          TEST_MATRIX=$(python3 project/scripts/get_spark_version_info.py --ci-test-matrix)
          echo "test_matrix=$(echo "$TEST_MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "Test matrix: $(echo "$TEST_MATRIX" | jq -c '.')"

  test:
    runs-on: ubuntu-latest
    needs: generate-matrix
    # Build a human-readable job name from the matrix entry, e.g.:
    #   "All tests (Spark 4.0.0, Delta 4.2.0)"
    #   "[Non Blocking] Spark tests (Spark 4.2.0-SNAPSHOT, Delta master-SNAPSHOT)"
    name: >-
      ${{ matrix.non-blocking && '[Non Blocking]' || '' }}
      ${{ matrix.validation-mode == 'spark-tests' && 'Spark tests' || 'All tests' }}
      (Spark ${{ matrix.spark-version }}${{ matrix.delta-version != '' && format(', Delta {0}', matrix.delta-version) || '' }})
    continue-on-error: ${{ matrix.non-blocking || false }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.test_matrix) }}
    steps:
      # Local composite actions require checkout before uses: ./.github/actions/...
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run UC unit tests
        uses: ./.github/actions/run-uc-unit-tests
        with:
          spark-version: ${{ matrix.spark-version }}
          delta-version: ${{ matrix.delta-version }}
          validation-mode: ${{ matrix.validation-mode }}
          use-spark-source-cache: ${{ matrix.source-build }}
