# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Unit Tests

on:
  push:
    branches: [ "main", "branch-*" ]
  pull_request:
    branches: [ "main", "branch-*" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # Build a human-readable job name from the matrix entry, e.g.:
    #   "All tests (Spark 4.0.0, Delta 4.1.0)"
    #   "[Non Blocking] Spark tests (Spark 4.2.0-preview5, Delta master-SNAPSHOT)"
    name: >-
      ${{ matrix.non-blocking && '[Non Blocking]' || '' }}
      ${{ matrix.validation-mode == 'spark-tests' && 'Spark tests' || 'All tests' }}
      (Spark ${{ matrix.spark-version }}${{ matrix.delta-version != '' && format(', Delta {0}', matrix.delta-version) || '' }})
    continue-on-error: ${{ matrix.non-blocking || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - spark-version: "4.0.0"
            delta-version: "4.1.0"
            # This is the primary combo: runs ALL tests (unit, spark, license).
            # Other combos run only spark connector tests since unit tests and
            # license checks don't depend on Spark/Delta versions.
            validation-mode: "all-tests"
            non-blocking: false
          - spark-version: "4.1.0"
            delta-version: "4.1.0"
            validation-mode: "spark-tests"
            non-blocking: false
          - spark-version: "4.1.0"
            delta-version: "master-SNAPSHOT"
            validation-mode: "spark-tests"
            # Cross-version testing with Delta master is informational; failures
            # indicate upcoming incompatibilities but should not block PRs.
            non-blocking: true
          - spark-version: "4.2.0-preview5"
            delta-version: "master-SNAPSHOT"
            validation-mode: "spark-tests"
            non-blocking: true

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'sbt'

    # Publish UC to local caches BEFORE building Delta — Delta's build resolves
    # UC artifacts from ~/.ivy2/local via -DunityCatalogVersion.
    - name: Build, package, and publish UC locally
      run: |
        SKIP_DELTA=""
        if [[ "${{ matrix.delta-version }}" == "master-SNAPSHOT" ]]; then
          SKIP_DELTA="-DskipDeltaSpark=true"
        fi
        build/sbt -DsparkVersion=${{ matrix.spark-version }} $SKIP_DELTA -J-Xmx2G package publishLocal publishM2

    - name: Build Delta SNAPSHOT from source
      if: matrix.delta-version == 'master-SNAPSHOT'
      id: delta-build
      run: |
        export SPARK_MAJOR_MINOR=$(echo "${{ matrix.spark-version }}" | cut -d. -f1,2)
        bash project/scripts/build_delta_from_source.sh

    - name: Set effective Delta version
      run: |
        if [[ "${{ matrix.delta-version }}" == "master-SNAPSHOT" ]]; then
          echo "DELTA_VERSION=${{ steps.delta-build.outputs.DELTA_VERSION }}" >> $GITHUB_ENV
        else
          echo "DELTA_VERSION=${{ matrix.delta-version }}" >> $GITHUB_ENV
        fi

      # 'integrationTests' is not in root project, since we avoid running it via `./build/sbt test`,
      # Here, we explicitly compile `integrationTests` to catch compilation issues early.
    - name: Compile integration tests to verify compilation and checkstyle issues.
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G integrationTests/test:compile

    - name: Run tests with coverage
      run: |
        if [[ "${{ matrix.validation-mode }}" == "spark-tests" ]]; then
          echo "Running spark connector tests"
          build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G spark/jacoco
        else
          echo "Running all tests"
          build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G +jacoco
        fi

    - name: Run license check
      if: matrix.validation-mode == 'all-tests'
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION licenseCheck
