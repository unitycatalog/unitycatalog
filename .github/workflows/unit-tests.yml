# documentation.

name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    name: test (Spark ${{ matrix.spark-version }})
    strategy:
      matrix:
        spark-version: ["4.0.0", "4.1.0"]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'temurin'

      # 'integrationTests' is not in root project, since we avoid running it via `./build/sbt test`,
      # Here, we explicitly compile `integrationTests` to catch compilation issues early.
    - name: Compile integration tests to verify compilation and checkstyle issues.
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} integrationTests/test:compile

    - name: Build and verify the local deployment.
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} clean package publishM2

    - name: Run tests with coverage
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -J-Xmx2G +jacoco

    - name: Run license check
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} licenseCheck
