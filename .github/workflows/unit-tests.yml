# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Unit Tests

on:
  push:
    branches: [ "main", "branch-*" ]
  pull_request:
    branches: [ "main", "branch-*" ]

permissions:
  contents: read

# Spark/Delta CI policy lives in project/spark-versions.json (ciTestMatrix + source-build
# metadata). project/scripts/get_spark_version_info.py is the workflow-facing API.
#
# Every PR runs four jobs:
# 1. generate-matrix: read ciTestMatrix and source-build Spark versions from metadata.
# 2. build-spark-source: for each source-build Spark version, resolve the metadata-owned
#    SHA, restore the exact Maven cache, and build/save Spark on cache miss.
# 3. test: published Spark/Delta combos from ciTestMatrix.published (no wait on step 2).
# 4. test-spark-source: source-build combos from ciTestMatrix.sourceBuild template (after step 2).
#
# Why two test jobs: GitHub Actions `needs` is per-job, not per-matrix-row. A single test job
# that depends on build-spark-source would block published Spark lanes on source builds.
#
# Cache model: build-spark-source saves ~/.m2/org/apache/spark under an exact cache key
# (no restore-keys). test-spark-source recomputes the same key and restores because jobs do
# not share filesystems. When the Spark SHA or build_spark.sh changes, a new key is used;
# older cache entries become orphaned and GitHub evicts them by LRU.
#
# Test-matrix policy (ciTestMatrix in spark-versions.json):
# - 4.0 + Delta 4.2 runs all-tests (unit, spark connector, license) as the primary combo.
# - Other published rows run spark-tests only; license/unit checks do not vary by Spark/Delta.
# - Delta master-SNAPSHOT rows are non-blocking informational signal for upcoming breakage.
# - Source-build rows inherit ciTestMatrix.sourceBuild (today: master-SNAPSHOT, non-blocking).
jobs:
  generate-matrix:
    name: Generate CI test matrix
    runs-on: ubuntu-latest
    outputs:
      published_test_matrix: ${{ steps.generate.outputs.published_test_matrix }}
      source_build_test_matrix: ${{ steps.generate.outputs.source_build_test_matrix }}
      source_build_spark_versions: ${{ steps.generate.outputs.source_build_spark_versions }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Generate CI test matrix from metadata
        id: generate
        run: |
          CI_TEST_MATRIX=$(python3 project/scripts/get_spark_version_info.py --ci-test-matrix)
          SOURCE_BUILD_SPARK_VERSIONS=$(python3 project/scripts/get_spark_version_info.py --source-build-spark-versions)
          echo "published_test_matrix=$(echo "$CI_TEST_MATRIX" | jq -c '.published')" >> "$GITHUB_OUTPUT"
          echo "source_build_test_matrix=$(echo "$CI_TEST_MATRIX" | jq -c '.sourceBuild')" >> "$GITHUB_OUTPUT"
          echo "source_build_spark_versions=$SOURCE_BUILD_SPARK_VERSIONS" >> "$GITHUB_OUTPUT"
          echo "Published test matrix: $(echo "$CI_TEST_MATRIX" | jq -c '.published')"
          echo "Source-build test matrix: $(echo "$CI_TEST_MATRIX" | jq -c '.sourceBuild')"
          echo "Source-build Spark versions: $SOURCE_BUILD_SPARK_VERSIONS"

  # Warms ~/.m2/repository/org/apache/spark once per source-build Spark version in metadata.
  build-spark-source:
    name: Build Spark ${{ matrix.spark-version }} from source
    runs-on: ubuntu-latest
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix:
        spark-version: ${{ fromJson(needs.generate-matrix.outputs.source_build_spark_versions) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'sbt'

      - name: Resolve Spark source build
        id: spark-source
        run: |
          # Resolves the Spark compatibility line, metadata-owned source ref,
          # immutable Spark SHA, commit-qualified local Maven version, and cache_key.
          python3 project/scripts/get_spark_version_info.py \
            --resolve-source-build \
            --spark-version "${{ matrix.spark-version }}"

      - name: Restore Spark Maven cache
        id: spark-source-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/org/apache/spark
          # Exact-match cache only. Spark source builds must not fall back to a
          # different SHA, artifact base version, or build_spark.sh hash.
          key: ${{ steps.spark-source.outputs.cache_key }}

      - name: Build Spark source ref locally
        if: steps.spark-source-cache.outputs.cache-hit != 'true'
        env:
          SPARK_SOURCE_REF: ${{ steps.spark-source.outputs.source_ref }}
          SPARK_VERSION: ${{ steps.spark-source.outputs.spark_version }}
          SPARK_BASE_VERSION: ${{ steps.spark-source.outputs.artifact_base_version }}
          SPARK_ARTIFACT_VERSION: ${{ steps.spark-source.outputs.spark_artifact_version }}
        run: bash project/scripts/build_spark.sh

      - name: Save Spark Maven cache
        if: steps.spark-source-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/org/apache/spark
          key: ${{ steps.spark-source.outputs.cache_key }}

  # Published Spark artifacts only. This job does not depend on build-spark-source.
  test:
    runs-on: ubuntu-latest
    needs: generate-matrix
    # Build a human-readable job name from the matrix entry, e.g.:
    #   "All tests (Spark 4.0.0, Delta 4.2.0)"
    #   "[Non Blocking] Spark tests (Spark 4.1.0, Delta master-SNAPSHOT)"
    name: >-
      ${{ matrix.non-blocking && '[Non Blocking]' || '' }}
      ${{ matrix.validation-mode == 'spark-tests' && 'Spark tests' || 'All tests' }}
      (Spark ${{ matrix.spark-version }}${{ matrix.delta-version != '' && format(', Delta {0}', matrix.delta-version) || '' }})
    continue-on-error: ${{ matrix.non-blocking || false }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.published_test_matrix) }}
    steps:
      # Local composite actions require checkout before uses: ./.github/actions/...
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run UC unit tests
        uses: ./.github/actions/run-uc-unit-tests
        with:
          spark-version: ${{ matrix.spark-version }}
          delta-version: ${{ matrix.delta-version }}
          validation-mode: ${{ matrix.validation-mode }}
          use-spark-source-cache: 'false'

  # Validates every source-build Spark row from ciTestMatrix after build-spark-source.
  test-spark-source:
    runs-on: ubuntu-latest
    needs: [generate-matrix, build-spark-source]
    name: >-
      ${{ matrix.non-blocking && '[Non Blocking]' || '' }}
      ${{ matrix.validation-mode == 'spark-tests' && 'Spark tests' || 'All tests' }}
      (Spark ${{ matrix.spark-version }}${{ matrix.delta-version != '' && format(', Delta {0}', matrix.delta-version) || '' }})
    continue-on-error: ${{ matrix.non-blocking || false }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.source_build_test_matrix) }}
    steps:
      # Local composite actions require checkout before uses: ./.github/actions/...
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run UC unit tests with source-built Spark
        uses: ./.github/actions/run-uc-unit-tests
        with:
          spark-version: ${{ matrix.spark-version }}
          delta-version: ${{ matrix.delta-version }}
          validation-mode: ${{ matrix.validation-mode }}
          use-spark-source-cache: 'true'
