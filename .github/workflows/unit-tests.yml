# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Unit Tests

on:
  push:
    branches: [ "main", "branch-*" ]
  pull_request:
    branches: [ "main", "branch-*" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    name: >-
      ${{ matrix.non-blocking && '[Non Blocking]' || '' }}
      ${{ matrix.validation-mode == 'spark-tests' && 'Spark tests' || 'All tests' }}
      (Spark ${{ matrix.spark-version }}, Delta ${{ matrix.delta-version }})
    continue-on-error: ${{ matrix.non-blocking || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary cell: runs ALL tests (unit, spark, license). The other cells
          # run only the spark-connector tests because unit tests and license
          # checks don't depend on the Spark/Delta version.
          - spark-version: "4.0.0"
            delta-version: "4.1.0"
            validation-mode: "all-tests"
            non-blocking: false
          - spark-version: "4.1.0"
            delta-version: "4.1.0"
            validation-mode: "spark-tests"
            non-blocking: false
          # Bleeding-edge informational signal -- failures indicate upcoming
          # Spark/Delta incompatibilities but don't block PRs.
          - spark-version: "4.1.0"
            delta-version: "master-SNAPSHOT"
            validation-mode: "spark-tests"
            non-blocking: true
          # Spark 4.2 cross-build cell. Delta only publishes a SNAPSHOT for 4.2
          # today; the connector pulls io.delta:delta-spark_4.2_2.13:4.1.0-SNAPSHOT
          # via Apache Snapshots (resolver added in #1518). Flip to non-blocking
          # = false once Delta publishes a stable 4.2 artifact.
          - spark-version: "4.2.0-SNAPSHOT"
            delta-version: "4.1.0-SNAPSHOT"
            validation-mode: "spark-tests"
            non-blocking: true

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'sbt'

    - name: Resolve Delta master version and commit SHA
      if: matrix.delta-version == 'master-SNAPSHOT'
      id: delta-meta
      run: |
        DELTA_SHA=$(git ls-remote https://github.com/delta-io/delta.git HEAD | cut -f1)
        DELTA_VER=$(curl -fsSL https://raw.githubusercontent.com/delta-io/delta/master/version.sbt \
              | grep -oP '(?<=")[^"]*-SNAPSHOT(?=")')
        echo "sha=$DELTA_SHA" >> $GITHUB_OUTPUT
        echo "version=$DELTA_VER" >> $GITHUB_OUTPUT

    - name: Cache Delta SNAPSHOT local Maven artifacts
      if: matrix.delta-version == 'master-SNAPSHOT'
      id: delta-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.m2/repository/io/delta
        key: delta-snapshot-${{ steps.delta-meta.outputs.sha }}

    - name: Build Delta SNAPSHOT from master and publish to local Maven
      if: matrix.delta-version == 'master-SNAPSHOT' && steps.delta-cache.outputs.cache-hit != 'true'
      run: |
        SPARK_MAJOR_MINOR=$(echo "${{ matrix.spark-version }}" | cut -d. -f1,2)
        git clone --depth=1 https://github.com/delta-io/delta.git /tmp/delta
        cd /tmp/delta
        # Publish only delta-spark and the modules its POM references at SNAPSHOT:
        # storage (dependsOn) and the kernel artifacts re-added via pomPostProcess.
        # This avoids compiling unrelated Delta projects (hudi, iceberg, flink, connect, ...).
        build/sbt -DsparkVersion=$SPARK_MAJOR_MINOR \
          storage/publishM2 \
          kernelApi/publishM2 \
          kernelDefaults/publishM2 \
          kernelUnityCatalog/publishM2 \
          spark/publishM2

    - name: Set effective Delta version
      run: |
        if [[ "${{ matrix.delta-version }}" == "master-SNAPSHOT" ]]; then
          echo "DELTA_VERSION=${{ steps.delta-meta.outputs.version }}" >> $GITHUB_ENV
        else
          echo "DELTA_VERSION=${{ matrix.delta-version }}" >> $GITHUB_ENV
        fi

      # 'integrationTests' is not in root project, since we avoid running it via `./build/sbt test`.
      # Here, we explicitly compile `integrationTests` to catch compilation issues early.
    - name: Compile integration tests to verify compilation and checkstyle issues.
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G integrationTests/test:compile

    - name: Build and verify the local deployment.
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G clean package publishM2

    - name: Run tests with coverage
      run: |
        if [[ "${{ matrix.validation-mode }}" == "spark-tests" ]]; then
          echo "Running spark connector tests only"
          build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G spark/jacoco
        else
          echo "Running all tests"
          build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G +jacoco
        fi

    - name: Run license check
      if: matrix.validation-mode == 'all-tests'
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION licenseCheck
