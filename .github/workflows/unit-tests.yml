# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Unit Tests

on:
  push:
    branches: [ "main", "branch-*" ]
  pull_request:
    branches: [ "main", "branch-*" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # Build a human-readable job name from the matrix entry, e.g.:
    #   "All tests (Spark 4.0.0, Delta 4.2.0)"
    #   "[Non Blocking] Spark tests (Spark 4.2.0-SNAPSHOT, Delta master-SNAPSHOT)"
    name: >-
      ${{ matrix.non-blocking && '[Non Blocking]' || '' }}
      ${{ matrix.validation-mode == 'spark-tests' && 'Spark tests' || 'All tests' }}
      (Spark ${{ matrix.spark-version }}${{ matrix.delta-version != '' && format(', Delta {0}', matrix.delta-version) || '' }})
    continue-on-error: ${{ matrix.non-blocking || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - spark-version: "4.0.0"
            delta-version: "4.2.0"
            # This is the primary combo: runs ALL tests (unit, spark, license).
            # Other combos run only spark connector tests since unit tests and
            # license checks don't depend on Spark/Delta versions.
            validation-mode: "all-tests"
            non-blocking: false
          - spark-version: "4.1.0"
            delta-version: "4.2.0"
            validation-mode: "spark-tests"
            non-blocking: false
          - spark-version: "4.1.0"
            delta-version: "master-SNAPSHOT"
            validation-mode: "spark-tests"
            # Cross-version testing with Delta master is informational; failures
            # indicate upcoming incompatibilities but should not block PRs.
            non-blocking: true
          - spark-version: "4.2.0-SNAPSHOT"
            delta-version: "master-SNAPSHOT"
            validation-mode: "spark-tests"
            non-blocking: true

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'sbt'

    - name: Resolve Spark source build
      if: matrix.spark-version == '4.2.0-SNAPSHOT' && matrix.delta-version == 'master-SNAPSHOT'
      id: spark-source
      run: |
        # Mirrors the producer workflow's cache identity calculation.
        python3 project/scripts/get_spark_version_info.py \
          --resolve-source-build \
          --spark-version "${{ matrix.spark-version }}"

    - name: Restore Spark Maven cache
      if: matrix.spark-version == '4.2.0-SNAPSHOT' && matrix.delta-version == 'master-SNAPSHOT'
      id: spark-source-cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.m2/repository/org/apache/spark
        # Exact-match cache only. Spark source builds must not fall back to a
        # different SHA or artifact base version.
        key: spark-m2-ubuntu-latest-scala-2.13-${{ steps.spark-source.outputs.spark_version }}-${{ steps.spark-source.outputs.artifact_base_version }}-${{ steps.spark-source.outputs.spark_sha }}-${{ hashFiles('project/scripts/build_spark.sh') }}

    - name: Fail on Spark source cache miss
      if: matrix.spark-version == '4.2.0-SNAPSHOT' && matrix.delta-version == 'master-SNAPSHOT' && steps.spark-source-cache.outputs.cache-hit != 'true'
      env:
        SPARK_SOURCE_REF: ${{ steps.spark-source.outputs.source_ref }}
      run: |
        echo "::error::Spark Maven artifacts were not found in the GitHub Actions cache. Run the Spark Source Artifact Cache workflow for $SPARK_SOURCE_REF first."
        exit 1

    - name: Verify restored Spark Maven artifacts
      if: matrix.spark-version == '4.2.0-SNAPSHOT' && matrix.delta-version == 'master-SNAPSHOT'
      env:
        SPARK_SOURCE_REF: ${{ steps.spark-source.outputs.source_ref }}
        SPARK_ARTIFACT_VERSION: ${{ steps.spark-source.outputs.spark_artifact_version }}
      run: |
        missing=0
        for module in spark-sql_2.13 spark-core_2.13 spark-catalyst_2.13 spark-hive_2.13; do
          pom="$HOME/.m2/repository/org/apache/spark/$module/$SPARK_ARTIFACT_VERSION/$module-$SPARK_ARTIFACT_VERSION.pom"
          if [[ ! -f "$pom" ]]; then
            echo "::error::Missing restored Spark Maven artifact: $pom"
            missing=1
          fi
        done
        if [[ "$missing" != "0" ]]; then
          echo "The Spark cache was restored, but it does not contain the expected Maven artifacts. Re-run the Spark Source Artifact Cache workflow for $SPARK_SOURCE_REF."
          exit 1
        fi
        echo "SPARK_COMMIT=${{ steps.spark-source.outputs.spark_sha }}" >> "$GITHUB_ENV"
        echo "SPARK_ARTIFACT_VERSION=$SPARK_ARTIFACT_VERSION" >> "$GITHUB_ENV"

    # Publish UC to local caches BEFORE building Delta — Delta's build resolves
    # UC artifacts from ~/.ivy2/local via -DunityCatalogVersion.
    - name: Build, package, and publish UC locally
      run: |
        SKIP_DELTA=""
        if [[ "${{ matrix.delta-version }}" == "master-SNAPSHOT" ]]; then
          SKIP_DELTA="-DskipDeltaSpark=true"
        fi
        build/sbt -DsparkVersion=${{ matrix.spark-version }} $SKIP_DELTA -J-Xmx2G package publishLocal publishM2

    - name: Build Delta SNAPSHOT from source
      if: matrix.delta-version == 'master-SNAPSHOT'
      id: delta-build
      run: |
        export SPARK_MAJOR_MINOR=$(echo "${{ matrix.spark-version }}" | cut -d. -f1,2)
        bash project/scripts/build_delta.sh

    - name: Set effective Delta version
      run: |
        if [[ "${{ matrix.delta-version }}" == "master-SNAPSHOT" ]]; then
          echo "DELTA_VERSION=${{ steps.delta-build.outputs.DELTA_VERSION }}" >> $GITHUB_ENV
        else
          echo "DELTA_VERSION=${{ matrix.delta-version }}" >> $GITHUB_ENV
        fi

      # 'integrationTests' is not in root project, since we avoid running it via `./build/sbt test`,
      # Here, we explicitly compile `integrationTests` to catch compilation issues early.
    - name: Compile integration tests to verify compilation and checkstyle issues.
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G integrationTests/test:compile

    - name: Run tests with coverage
      run: |
        if [[ "${{ matrix.validation-mode }}" == "spark-tests" ]]; then
          echo "Running spark connector tests"
          build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G spark/jacoco
        else
          echo "Running all tests"
          build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION -J-Xmx2G +jacoco
        fi

    - name: Run license check
      if: matrix.validation-mode == 'all-tests'
      run: build/sbt -DsparkVersion=${{ matrix.spark-version }} -DdeltaVersion=$DELTA_VERSION licenseCheck
