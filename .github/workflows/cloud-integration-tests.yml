# Runs integration tests under integration-tests/ against all three cloud vendors:
# AWS (S3), GCP (GCS), and Azure (ABFSS).
#
# Each vendor runs as an independent matrix job so one vendor's failure does not
# block the others. The tests start a local Spark session and use the
# unitycatalog-spark-connector to interact with a pre-existing remote UC server —
# no local UC server is started by this workflow.
#
# Triggers:
#   - Automatically: daily at 03:00 UTC
#   - Manually: via the "Run workflow" button in the Actions tab, or:
#       gh workflow run cloud-integration-tests.yml -f vendors='["s3","gcs","abfss"]'
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#
#   Per-vendor UC server connection:
#     AWS_CATALOG_URI          - Remote UC server URL for AWS tests
#     AWS_CATALOG_AUTH_TOKEN   - Auth token for AWS UC server
#     AWS_CATALOG_NAME         - Catalog name for AWS tests
#     AWS_SCHEMA_NAME          - Schema name for AWS tests
#
#     GCP_CATALOG_URI          - Remote UC server URL for GCP tests
#     GCP_CATALOG_AUTH_TOKEN   - Auth token for GCP UC server
#     GCP_CATALOG_NAME         - Catalog name for GCP tests
#     GCP_SCHEMA_NAME          - Schema name for GCP tests
#
#     AZURE_CATALOG_URI        - Remote UC server URL for Azure tests
#     AZURE_CATALOG_AUTH_TOKEN - Auth token for Azure UC server
#     AZURE_CATALOG_NAME       - Catalog name for Azure tests
#     AZURE_SCHEMA_NAME        - Schema name for Azure tests
#
#   Per-vendor cloud storage base location:
#     S3_BASE_LOCATION         - e.g. s3://my-bucket/integration-tests/
#     GS_BASE_LOCATION         - e.g. gs://my-bucket/integration-tests/
#     ABFSS_BASE_LOCATION      - e.g. abfss://container@account.dfs.core.windows.net/path/
name: Cloud Integration Tests

on:
  schedule:
    # Runs every day at 03:00 UTC
    - cron: '0 3 * * *'
  # Allows manual triggering with a configurable list of vendors from the
  # Actions tab or via: gh workflow run cloud-integration-tests.yml -f vendors='["s3","gcs","abfss"]'
  workflow_dispatch:
    inputs:
      vendors:
        description: 'list of cloud vendors to test (JSON): s3, gcs, abfss'
        required: true
        # keep in sync with default value of strategy matrix 'vendor'
        default: '["s3", "gcs", "abfss"]'

jobs:
  integration-test:
    # Guard: only run from the official repository, never from forks.
    # TODO: Change back to 'unitycatalog/unitycatalog' before merging. Temporarily
    # set to 'openinx/unitycatalog' to allow manual testing via workflow_dispatch
    # on the fork before this PR is merged into unitycatalog/unitycatalog.
    if: github.repository == 'openinx/unitycatalog'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # TODO: Set to a short duration to quickly validate the full workflow succeeds.
      # Once all three vendors pass with this short duration, revert to the default
      # (5400s / 90 minutes) to enable the real credential renewal integration tests.
      CREDENTIAL_RENEWAL_TEST_DURATION_SECONDS: 1000
    strategy:
      fail-fast: false
      matrix:
        # keep in sync with default value of workflow_dispatch input 'vendors'
        vendor: ${{ fromJSON(inputs.vendors || '["s3", "gcs", "abfss"]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build all modules and publish the Spark connector to the local Maven
      # cache so the integration tests can resolve it as a dependency.
      - name: Build and publish locally
        run: ./build/sbt -mem 4096 clean package publishLocal

      # Run integration tests against AWS S3.
      # The tests start a local Spark session that connects to the remote UC
      # server via CATALOG_URI and authenticates with CATALOG_AUTH_TOKEN.
      - name: Run S3 integration tests
        if: matrix.vendor == 's3'
        env:
          CATALOG_URI: ${{ secrets.AWS_CATALOG_URI }}
          CATALOG_AUTH_TOKEN: ${{ secrets.AWS_CATALOG_AUTH_TOKEN }}
          CATALOG_NAME: ${{ secrets.AWS_CATALOG_NAME }}
          SCHEMA_NAME: ${{ secrets.AWS_SCHEMA_NAME }}
          S3_BASE_LOCATION: ${{ secrets.S3_BASE_LOCATION }}
        run: ./build/sbt -mem 8192 "integrationTests/test"

      # Run integration tests against Google Cloud Storage.
      - name: Run GCS integration tests
        if: matrix.vendor == 'gcs'
        env:
          CATALOG_URI: ${{ secrets.GCP_CATALOG_URI }}
          CATALOG_AUTH_TOKEN: ${{ secrets.GCP_CATALOG_AUTH_TOKEN }}
          CATALOG_NAME: ${{ secrets.GCP_CATALOG_NAME }}
          SCHEMA_NAME: ${{ secrets.GCP_SCHEMA_NAME }}
          GS_BASE_LOCATION: ${{ secrets.GS_BASE_LOCATION }}
        run: ./build/sbt -mem 8192 "integrationTests/test"

      # Run integration tests against Azure Data Lake Storage.
      - name: Run Azure integration tests
        if: matrix.vendor == 'abfss'
        env:
          CATALOG_URI: ${{ secrets.AZURE_CATALOG_URI }}
          CATALOG_AUTH_TOKEN: ${{ secrets.AZURE_CATALOG_AUTH_TOKEN }}
          CATALOG_NAME: ${{ secrets.AZURE_CATALOG_NAME }}
          SCHEMA_NAME: ${{ secrets.AZURE_SCHEMA_NAME }}
          ABFSS_BASE_LOCATION: ${{ secrets.ABFSS_BASE_LOCATION }}
        run: ./build/sbt -mem 8192 "integrationTests/test"
