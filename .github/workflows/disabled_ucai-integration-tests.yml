name: Unity Catalog AI Databricks Integration Tests

on:
  push:
    branches:
      - main
    paths:
      - ai/integrations/**
      - .github/workflows/ucai-integration-tests.yml
  pull_request:
    paths:
      - ai/integrations/**
      - .github/workflows/ucai-integration-tests.yml

permissions:
  contents: read

env:
  UV_EXCLUDE_NEWER: "2026-03-10T00:00:00Z"

jobs:
  crewai_test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ai
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: bash "$GITHUB_WORKSPACE/.github/scripts/install-uv.sh"
      - name: Install dependencies
        run: |
          uv pip install --system 'core/.'
          echo "PYTHONPATH=$(pwd)/core/src:\$PYTHONPATH" >> $GITHUB_ENV
          uv pip install --system 'integrations/crewai[dev]'
          uv pip install --system 'mlflow>=3.3.0,<=3.10.0'
      - name: Run tests
        run: |
          uv run pytest integrations/crewai/tests --ignore=integrations/crewai/tests/test_crewai_toolkit_oss.py

