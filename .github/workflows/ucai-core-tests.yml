name: UCAI Core Tests

on:
  push:
    branches:
      - main
    paths:
      - ai/**
      - .github/workflows/ucai-*.yml
  pull_request:
    paths:
      - ai/**
      - .github/workflows/ucai-*.yml

env:
  UV_EXCLUDE_NEWER: "2026-03-10T00:00:00Z"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ai
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'
      - name: Install uv
        run: bash "$GITHUB_WORKSPACE/.github/scripts/install-uv.sh"
      - name: Install dependencies
        run: |
          uv pip install --system --require-hashes -r requirements/lint-requirements.lock
      - name: Lint Python code with ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Lint YAML files with yamllint
        run: yamllint .

  core_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
        pydantic-version: [1, 2]
    timeout-minutes: 40
    defaults:
      run:
        working-directory: ai
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: bash "$GITHUB_WORKSPACE/.github/scripts/install-uv.sh"
      - name: Install dependencies
        run: |
          uv pip install --system --require-hashes -r core/requirements-dev.lock
          if [ ${{ matrix.pydantic-version }} == 1 ]; then
            uv pip install --system 'pydantic<2'
          fi
      - name: Install Unity Catalog Python Libraries
        run: |
          dev/install_client.sh
      - name: Start Unity Catalog Server
        run: |
          dev/start_unitycatalog.sh
      - name: Run Tests
        run: |
          uv run pytest core/tests --ignore=core/tests/core/databricks/test_databricks_unit_tests.py
      - name: Run Databricks Unit Tests
        run: |
          uv pip install --system --require-hashes -r core/requirements-databricks-dev.lock
          uv run pytest core/tests/core/databricks/test_databricks_unit_tests.py
      - name: Stop Unity Catalog Server
        if: always()
        run: |
          dev/teardown_server.sh
