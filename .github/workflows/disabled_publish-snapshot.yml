# Publishes SNAPSHOT artifacts from one or more branches to the Sonatype snapshots repository.
#
# Triggers:
#   - Automatically: daily at 02:00 UTC
#   - Manually: via the "Run workflow" button in the Actions tab, or:
#       gh workflow run publish-snapshot.yml -f branches='["main"]'
#
# Required GitHub environment (Settings → Environments → sonatype-publish):
#   - Deployment branches: restricted to "main" (enforced server-side by GitHub)
#   - Secrets:
#     SONATYPE_USERNAME - Sonatype Central username
#     SONATYPE_PASSWORD - Sonatype Central password or user token
#
# Published artifacts land at:
#   https://central.sonatype.com/repository/maven-snapshots/io/unitycatalog/
name: Publish Snapshot

on:
  schedule:
    # Runs every day at 02:00 UTC
    - cron: '0 2 * * *'
  # Allows manual triggering with a configurable list of branches from the
  # Actions tab or via: gh workflow run publish-snapshot.yml -f branches='["main"]'
  workflow_dispatch:
    inputs:
      branches:
        description: 'list of branches to publish (JSON)'
        required: true
        # keep in sync with default value of strategy matrix 'branch'
        default: '["main"]'

jobs:
  publish-snapshot:
    # Guard: only publish from the official repository, never from forks.
    # This prevents snapshot publishes even if workflow_dispatch is triggered
    # on a fork that has the secrets configured.
    if: false  # Disabled to prevent supply chain attacks; re-enable the line below to restore
    # if: github.repository == 'unitycatalog/unitycatalog'
    runs-on: ubuntu-latest
    # The environment restricts secret injection to allowed branches (e.g. main)
    # server-side. This prevents a workflow_dispatch on a rogue branch from
    # accessing publishing credentials even if the workflow file is modified.
    environment: sonatype-publish
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # keep in sync with default value of workflow_dispatch input 'branches'
        branch: ${{ fromJSON( inputs.branches || '["main"]' ) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ matrix.branch }}

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'

      # Safety check: abort if the current version is not a SNAPSHOT.
      # This prevents accidentally overwriting a release artifact in the
      # snapshots repository (e.g. if version.sbt was updated to a release
      # version but the release workflow hasn't run yet).
      - name: Verify version is a SNAPSHOT
        run: |
          VERSION=$(sed -n 's/.*version := "\(.*\)".*/\1/p' version.sbt)
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Could not parse version from version.sbt"
            exit 1
          fi
          echo "Detected version: $VERSION"
          if [[ "$VERSION" != *"-SNAPSHOT" ]]; then
            echo "ERROR: Version '$VERSION' is not a SNAPSHOT version. Aborting."
            exit 1
          fi

      # Publishes all cross-Scala-version artifacts using the `+publish` command.
      # clean ensures a fresh build; package triggers source generation (including
      # OpenAPI-generated classes) and compilation before publishing.
      # Credentials are read by ReleaseSettings.scala via SONATYPE_USERNAME and
      # SONATYPE_PASSWORD environment variables — secrets are never echoed in logs.
      - name: Publish snapshot artifacts to Sonatype
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: ./build/sbt -mem 4096 "clean; package; +publish"
