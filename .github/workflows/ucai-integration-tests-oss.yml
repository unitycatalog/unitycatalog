name: Unity Catalog AI Integration Tests

on:
  push:
    branches:
      - main
    paths:
      - ai/**
      - .github/workflows/ucai-*.yml
      - clients/python/**
  pull_request:
    paths:
      - ai/**
      - .github/workflows/ucai-*.yml
      - clients/python/**

env:
  UV_EXCLUDE_NEWER: "2026-03-10T00:00:00Z"

jobs:
  integration_tests:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
        pydantic-version: [1, 2]
    timeout-minutes: 40
    defaults:
      run:
        working-directory: ai
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: bash "$GITHUB_WORKSPACE/.github/scripts/install-uv.sh"
      - name: Install Unity Catalog Python Libraries
        run: |
          dev/install_client.sh
      - name: Start Unity Catalog Server
        run: |
          dev/start_unitycatalog.sh
      - name: Run OpenAI OSS Integration Tests
        working-directory: ai/integrations/openai
        run: |
          uv sync --extra dev
          if [ ${{ matrix.pydantic-version }} == 1 ]; then
            uv pip install 'pydantic<2'
          fi
          uv run pytest tests/test_openai_toolkit_oss.py
      - name: Run LangChain OSS Integration Tests
        if: matrix.pydantic-version == 2
        working-directory: ai/integrations/langchain
        run: |
          uv sync --extra dev
          uv run pytest tests/test_langchain_toolkit_oss.py
      - name: Run Anthropic OSS Integration Tests
        working-directory: ai/integrations/anthropic
        run: |
          uv sync --extra dev
          if [ ${{ matrix.pydantic-version }} == 1 ]; then
            uv pip install 'pydantic<2'
          fi
          uv run pytest tests/test_anthropic_toolkit_oss.py
      - name: Run AutoGen OSS Integration Tests

        working-directory: ai/integrations/autogen
        run: |
          uv sync --extra dev
          uv run pytest tests/test_autogen_toolkit_oss.py
      # TODO: re-enable after Python 3.11 is supported in the executor (fork+asyncio issue)
      # - name: Run CrewAI OSS Integration Tests
      #   working-directory: ai/integrations/crewai
      #   run: |
      #     uv sync --extra dev
      #     uv run pytest tests/test_crewai_toolkit_oss.py
      - name: Run Gemini OSS Integration Tests
        working-directory: ai/integrations/gemini
        run: |
          uv sync --extra dev
          if [ ${{ matrix.pydantic-version }} == 1 ]; then
            uv pip install 'pydantic<2'
          fi
          uv run pytest tests/test_gemini_toolkit_oss.py
      - name: Run LiteLLM OSS Integration Tests

        working-directory: ai/integrations/litellm
        run: |
          uv sync --extra dev
          uv run pytest tests/test_litellm_toolkit_oss.py
      - name: Run Dspy OSS Integration Tests

        working-directory: ai/integrations/dspy
        run: |
          uv sync --extra dev
          uv run pytest tests/test_dspy_toolkit_oss.py
      - name: Run LlamaIndex OSS Integration Tests

        working-directory: ai/integrations/llama_index
        run: |
          uv sync --extra dev
          uv run pytest tests/test_llama_index_toolkit_oss.py
      - name: Stop Unity Catalog Server
        run: |
          dev/teardown_server.sh
