name: Publish Client (GitHub Packages)

# Quick publish of the unitycatalog-client jar to this repo's GitHub Packages
# Maven registry (https://maven.pkg.github.com/<owner>/<repo>).
#
# This intentionally bypasses the upstream Sonatype/PGP release machinery in
# project/ReleaseSettings.scala: it overrides `publishTo` + `credentials` at
# invocation time and runs a plain (unsigned) `client/publish`. No build.sbt
# changes, so it won't conflict with upstream merges. Repo-depot / Artifactory
# enrollment can replace this later without touching the build.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (GitHub Packages rejects re-publishing the same version; bump this each run)"
        required: true
        default: "0.5.0-celonis.1"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Publish unitycatalog-client to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLISH_VERSION: ${{ inputs.version }}
        run: |
          build/sbt \
            'set ThisBuild / version := sys.env("PUBLISH_VERSION")' \
            'set client / publishTo := Some("GitHub Packages" at "https://maven.pkg.github.com/" + sys.env("GITHUB_REPOSITORY"))' \
            'set client / credentials += Credentials("GitHub Package Registry", "maven.pkg.github.com", sys.env("GITHUB_ACTOR"), sys.env("GITHUB_TOKEN"))' \
            client/publish
