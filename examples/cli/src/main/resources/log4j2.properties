status = warn
name = UnityCatalogCliConfig

# Console appender for CLI output
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

rootLogger.level = ${sys:uc.log.level:-info}
rootLogger.appenderRefs = console
rootLogger.appenderRef.console.ref = Console

# Quiet noisy libraries in CLI context
logger.hibernate.name = org.hibernate
logger.hibernate.level = warn

logger.h2.name = org.h2
logger.h2.level = warn
