# Unity Catalog + Delta + MinIO defaults for the docker/spark image.
# Catalog name, URI, and token are set at runtime by entrypoint.sh.

spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension,io.unitycatalog.spark.UCSparkSessionExtensions
spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog

# S3A / MinIO (path-style; endpoint overridden per catalog via UC vended creds when present)
spark.hadoop.fs.s3.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.connection.ssl.enabled=false

spark.sql.shuffle.partitions=4
