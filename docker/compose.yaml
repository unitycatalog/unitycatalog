# Local development stack: S3-compatible object storage for Unity Catalog.
#
# Start MinIO only:
#   docker compose -f docker/compose.yaml up -d
#
# Start MinIO + Celonis OAuth (OIDC):
#   docker compose -f docker/compose.yaml -f docker/oidc/compose.yaml up -d
#
# Spark 4.1 smoke test (UC server on host required — see docker/spark/run-test.sh):
#   docker/spark/run-test.sh
#
# MinIO API:      http://localhost:9000
# MinIO console:  http://localhost:9001  (minioadmin / minioadmin)

name: unitycatalog-local

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/unity-catalog &&
      mc mb --ignore-existing local/data &&
      exit 0
      "

  spark:
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_IMAGE: "apache/spark:4.1.2-scala2.13-java17-python3-ubuntu"
        UC_SPARK_VERSION: "0.5.0-SNAPSHOT"
        DELTA_VERSION: "4.2.0"
        HADOOP_AWS_VERSION: "3.4.2"
    image: unitycatalog-local-spark:4.1.2
    depends_on:
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      UC_SERVER_URI: http://host.docker.internal:8080
      UC_CATALOG: ${UC_CATALOG:-catA}
      UC_AUTH_TOKEN: ${UC_AUTH_TOKEN:-}
      MINIO_ENDPOINT: http://minio:9000
    profiles:
      - spark

  # Long-running Spark Thrift Server; SQL clients connect via JDBC (beeline).
  # UCSingleCatalog in spark-defaults.conf talks to UC REST on the host.
  spark-thrift:
    image: unitycatalog-local-spark:4.1.2
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_IMAGE: "apache/spark:4.1.2-scala2.13-java17-python3-ubuntu"
        UC_SPARK_VERSION: "0.5.0-SNAPSHOT"
        DELTA_VERSION: "4.2.0"
        HADOOP_AWS_VERSION: "3.4.2"
    depends_on:
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      UC_SERVER_URI: http://host.docker.internal:8080
      UC_CATALOG: ${UC_CATALOG:-catA}
      UC_AUTH_TOKEN: ${UC_AUTH_TOKEN:-}
      MINIO_ENDPOINT: http://minio:9000
      THRIFT_BIND_HOST: 0.0.0.0
      THRIFT_PORT: "10000"
    ports:
      - "10000:10000"
    command: ["/opt/spark/uc-scripts/start-thriftserver-uc.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "timeout 2 bash -c 'echo > /dev/tcp/127.0.0.1/10000'",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
    profiles:
      - spark

volumes:
  minio-data:
