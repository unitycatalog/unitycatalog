# Local OIDC provider for Unity Catalog auth testing (Celonis cloud-oauth-server).
#
# Start:
#   docker compose -f docker/oidc/compose.yaml up -d
#
# OAuth discovery: https://dev.dev.celonis.cloud/.well-known/openid-configuration
# (add `127.0.0.1 dev.dev.celonis.cloud` to /etc/hosts; Caddy serves TLS on port 443)
#
# Lighter alternative: see compose.mock-oauth2.yaml and README.md

name: unitycatalog-oidc

services:
  postgres:
    image: postgres:13-alpine
    environment:
      POSTGRES_USER: celonis
      POSTGRES_PASSWORD: celonis
      POSTGRES_DB: oauth-server
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celonis -d oauth-server"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  oauth-server:
    image: ghcr.io/celonis/cloud-oauth-server/oauth-server:${OAUTH_SERVER_TAG:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: default,local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/oauth-server
      SPRING_DATASOURCE_USERNAME: celonis
      SPRING_DATASOURCE_PASSWORD: celonis
      JAVA_TOOL_OPTIONS: "-XX:+IgnoreUnrecognizedVMOptions -XX:UseSVE=0"
    volumes:
      - ./oauth/jwks.json:/etc/oauth-server/jwks.json:ro
      - ./oauth/application-local.yaml:/usr/share/app/resources/application-local.yaml:ro
    ports:
      - "9099:9099"
    depends_on:
      postgres:
        condition: service_healthy

  oauth-gateway:
    image: caddy:2-alpine
    ports:
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      oauth-server:
        condition: service_started
