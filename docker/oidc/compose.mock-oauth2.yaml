# Lighter OIDC mock for automated tests and quick CLI/API auth checks.
# No admin UI — good when you only need tokens, not interactive IdP setup.
#
# Start:
#   docker compose -f docker/oidc/compose.mock-oauth2.yaml up -d
#
# Issuer: http://localhost:9090/default
# Discovery: http://localhost:9090/default/.well-known/openid-configuration

name: unitycatalog-oidc-mock

services:
  mock-oauth2:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "9090:8080"
    environment:
      SERVER_PORT: 8080
      LOG_LEVEL: info
    volumes:
      - ./mock-oauth2/config.json:/config/config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/isalive >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
