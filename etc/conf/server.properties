server.env=dev
server.authorization=enable
server.authorization-url=http://localhost:9090/realms/unity-catalog/protocol/openid-connect/auth
server.token-url=http://localhost:9090/realms/unity-catalog/protocol/openid-connect/token
server.client-id=unity-catalog-local
server.client-secret=unity-catalog-local-secret
server.redirect-port=8080
server.allowed-issuers=http://localhost:9090/realms/unity-catalog
server.audiences=unity-catalog-local
server.cookie-timeout=P5D

aws.masterRoleArn=arn:aws:iam::123456789012:user/uc-master
aws.accessKey=minioadmin
aws.secretKey=minioadmin
aws.region=us-east-1
# Host UC → MinIO (docker/minio/server.properties.snippet)
aws.endpointUrl=http://[::1]:9000

s3.bucketPath.0=s3://unity-catalog
s3.region.0=us-east-1
s3.accessKey.0=minioadmin
s3.secretKey.0=minioadmin
s3.endpointUrl.0=http://[::1]:9000
s3.sessionToken.0=minio

# Supplementary data-bucket external locations (s3://data/tenant/{id})
s3.bucketPath.1=s3://data
s3.region.1=us-east-1
s3.accessKey.1=minioadmin
s3.secretKey.1=minioadmin
s3.endpointUrl.1=http://[::1]:9000
s3.sessionToken.1=minio

storage-root.tables=s3://unity-catalog/ucroot
storage-root.models=s3://unity-catalog/ucroot

# Spark in Docker uses minio:9000 via docker/spark/scripts/entrypoint.sh
# (spark.hadoop.fs.s3a.endpoint). host.docker.internal is not required here.
